<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡号管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 font-sans text-gray-900 dark:text-gray-100">
    <!-- Background Accents -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-purple-400 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
        <div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-yellow-400 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-32 left-20 w-96 h-96 bg-pink-400 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-4000"></div>
    </div>

    <div class="relative z-10 w-full max-w-5xl mx-auto p-4" style="min-height: 100vh; display: flex; flex-direction: column; justify-content: center;">
        <!-- Header -->
        <header class="mb-12 text-center">
            <h1 class="text-5xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 via-pink-600 to-blue-600 mb-4 tracking-tight">
                卡号管理系统
            </h1>
            <div id="user-info" class="flex justify-center mb-2"></div>
            <p class="text-lg text-gray-600 dark:text-gray-400 max-w-2xl mx-auto">
                安全、极速、可靠的虚拟卡密服务中心
            </p>
        </header>

        <!-- Navigation Tabs -->
        <div class="flex justify-center mb-12">
            <div class="bg-white dark:bg-gray-800 p-1 rounded-xl shadow-lg inline-flex">
                <button onclick="switchTab('redeem')" id="tab-redeem" class="px-8 py-3 rounded-lg text-sm font-bold transition-all duration-200 bg-gradient-to-r from-purple-600 to-indigo-600 text-white shadow-md">
                    卡密兑换
                </button>
                <button onclick="switchTab('buy')" id="tab-buy" class="px-8 py-3 rounded-lg text-sm font-bold transition-all duration-200 text-gray-500 hover:text-gray-900 dark:hover:text-gray-200">
                    购买月卡
                </button>
                <button onclick="switchTab('admin')" id="tab-admin" class="px-8 py-3 rounded-lg text-sm font-bold transition-all duration-200 text-gray-500 hover:text-gray-900 dark:hover:text-gray-200">
                    后台管理
                </button>
            </div>
        </div>

        <!-- Content Area -->
        <main id="content-area" class="transition-all duration-500 ease-in-out">
            <!-- Content will be injected here by JavaScript -->
        </main>

        <!-- Footer -->
        <footer class="mt-16 text-center text-gray-400 text-sm">
            &copy; 2024 此卡号系统由 Vibe Coding 支持。
        </footer>
    </div>

    <!-- Modals and Toasts容器 -->
    <div id="modal-container"></div>
    <div id="toast-container" class="fixed top-20 right-5 z-50"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
